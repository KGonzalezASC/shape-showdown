services:
  shape-showdown-server:
    build: .
    container_name: shape-showdown-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:${SERVER_PORT}:${SERVER_PORT}"
    environment:
      - NODE_ENV=production
      - PORT=${SERVER_PORT}
      - REPLAYS_DIR=/app/public/replays
    volumes:
      - ${REPLAYS_HOST_PATH}:/app/public/replays
